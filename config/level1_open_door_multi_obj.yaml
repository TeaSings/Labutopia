# Open 门 - 多仪器采集（3 种门轮换）
# DryingBox_01, DryingBox_02, MuffleFurnace
defaults:
  - level1_open_door
  - universal_vlm_collect
  - _self_

name: Level1_open_door_multi_obj
max_episodes: 450   # 150 ep/门 × 3 门

task:
  operate_type: "door"
  obj_paths:
    - path: "/World/DryingBox_01"
      position_range:
        x: [0.70, 0.80]
        y: [0.05, 0.15]
        z: [0.78, 0.78]
      close_gripper_distance: 0.015
    - path: "/World/DryingBox_02"
      position_range:
        x: [0.72, 0.77]
        y: [-0.05, 0.010]
        z: [0.78, 0.78]
      close_gripper_distance: 0.02
    - path: "/World/MuffleFurnace"
      position_range:
        x: [0.65, 0.70]
        y: [-0.05, 0.010]
        z: [0.78, 0.78]
      close_gripper_distance: 0.02
