defaults:
  - level1_close_drawer
  - _self_

name: Level1_close_drawer_noise_v12

close:
  post_hold_steps: 130

noise:
  enabled: true
  noise_scale: 1.0
  failure_bias_ratio: 0.0
  noise_distribution: "uniform"
  push_distance_distribution: "min_bias"
  drawer_approach_offset_x_distribution: "uniform"
  drawer_push_offset_x_distribution: "min_bias"
  drawer_contact_offset_y_distribution: "edge_bias"
  drawer_contact_offset_z_distribution: "max_bias"
  end_effector_euler_distribution: "edge_bias"
  push_distance: [-0.135, -0.025]
  drawer_approach_offset_x: [-0.020, 0.004]
  drawer_push_offset_x: [-0.045, -0.002]
  drawer_contact_offset_y: [-0.125, 0.125]
  drawer_contact_offset_z: [0.005, 0.095]
  end_effector_euler_deg: [-9.5, 9.5]
