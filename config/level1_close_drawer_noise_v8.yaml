defaults:
  - level1_close_drawer
  - _self_

name: Level1_close_drawer_noise_v8

noise:
  enabled: true
  noise_scale: 1.05
  failure_bias_ratio: 0.75
  noise_distribution: "uniform"
  push_distance_distribution: "min_bias"
  drawer_approach_offset_x_distribution: "uniform"
  drawer_push_offset_x_distribution: "min_bias"
  drawer_contact_offset_y_distribution: "edge_bias"
  drawer_contact_offset_z_distribution: "edge_bias"
  end_effector_euler_distribution: "edge_bias"
  push_distance: [-0.070, 0.000]
  drawer_approach_offset_x: [-0.040, 0.010]
  drawer_push_offset_x: [-0.045, 0.005]
  drawer_contact_offset_y: [-0.090, 0.090]
  drawer_contact_offset_z: [-0.015, 0.060]
  end_effector_euler_deg: [-9.0, 9.0]
