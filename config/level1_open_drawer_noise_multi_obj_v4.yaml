# V4: 取 v2 / v3 中间值，做一次更细的 drawer pull 难度回调。
# 目标把成功率从 v3 的 41% 拉回到更接近 25%-35% 的区间。

defaults:
  - level1_open_drawer_noise_multi_obj_v2
  - _self_

name: Level1_open_drawer_noise_multi_obj_v4

noise:
  stage0_offset_x: [0.0, 0.008]
  stage1_offset_x: [0.0, 0.004]
  drawer_pull_offset_x: [-0.0125, -0.003]
  drawer_retreat_offset_x: [-0.015, -0.0045]
  drawer_retreat_offset_z: [-0.0075, 0.0]
  end_effector_euler_deg: [-3.25, 3.25]
  close_gripper_distance: [0.0, 0.00325]
