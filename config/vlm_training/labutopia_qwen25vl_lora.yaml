# LabUtopia Qwen2.5-VL LoRA 微调配置
# 流程总览: docs/DATA_AND_TRAINING_MASTER_PLAN.md
# 用法: 复制到 LLaMA-Factory 后执行
#   llamafactory train config/labutopia_qwen25vl_lora.yaml

### 模型
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
template: qwen2_vl

### 数据
dataset: labutopia_pick
dataset_dir: data
max_samples: 5000
cutoff_len: 2048  # 若训练数据为 full+temporal-stride 变长多图，可改为 4096 或更大（视显存）
preprocessing_num_workers: 4

### LoRA
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 64
lora_alpha: 128

### 训练
output_dir: outputs/labutopia_qwen25vl
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
