name: Level1_place

task_type: "place"
controller_type: "place"

mode: "collect"

usd_path: "assets/chemistry_lab/lab_001/lab_001.usd"
target_path: "/World/target_plat"


max_episodes: 11

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

task:
  max_steps: 2000
  camera_warmup_frames: 45
  obj_paths:
    - path: "/World/beaker2"
      position_range:
        x: [0.19, 0.34]
        y: [0.10, 0.25]
        z: [0.84, 0.84]

    - path: "/World/target_plat"
      position_range:
        x: [0.18, 0.33]
        y: [-0.32, -0.17]
        z: [0.776, 0.776]

cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, 0, 2]
    resolution: [256, 256]
    focal_length: 5
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb"

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, 0, 2.5]
    resolution: [256, 256]
    focal_length: 5
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"

  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"

robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip
  save_frames: -1

# place 任务包含 pick 子阶段，先把这一层关键取物参数提到 YAML，避免继续硬改 controller。
pick:
  pre_offset_x: 0.05
  pre_offset_z: 0.05
  after_offset_z: 0.15
  end_effector_euler_deg: [0.0, 90.0, 30.0]

# place 子阶段与整局成功判定参数。
place:
  pick_events_dt: [0.002, 0.002, 0.005, 0.02, 0.05, 0.01, 0.02]
  place_events_dt: [0.005, 0.01, 0.08, 0.05, 0.01, 0.1]
  pick_success_min_height_delta: 0.10
  place_success_xy_threshold: 0.05
  place_success_z_threshold: 0.05
  end_effector_euler_deg: [0.0, 90.0, 20.0]
  pre_place_z: 0.20
  place_offset_z: 0.05
  position_threshold: 0.01
  release_position_threshold: 0.02
  retreat_offset_x: -0.15
  retreat_offset_z: 0.15

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}
