name: Level1_stir

task_type: "stir"
controller_type: "stir"

mode: "collect"  # "collect" or "infer"

usd_path: "assets/chemistry_lab/lab_003/lab_003.usd"
obj_path: "/World/glass_rod"  
sub_obj_path: "/World/glass_rod/Cylinder"
target_path: "/World/beaker_2"

max_episodes: 100

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

cameras_names: ["camera_1", "camera_2", "camera_3"]
cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, 0, 2]
    resolution: [256, 256]
    focal_length: 4
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb" 

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, 0, 2.5]
    resolution: [256, 256]
    focal_length: 4
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"
    
  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"
robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip
  save_frames: -1

task:
  camera_warmup_frames: 45
  max_steps: 2400
  target_position_range_xy: [0.075, 0.075]

stir:
  pick:
    events_dt: [0.004, 0.002, 0.005, 0.02, 0.05, 0.004, 0.02]
    position_threshold: 0.005
    object_name: "glass_rod"
    pre_offset_x: 0.1
    pre_offset_z: 0.12
    after_offset_z: 0.15
    gripper_distance: 0.005
    end_effector_euler_deg: [0.0, 90.0, 30.0]
  motion:
    events_dt: [0.004, 0.004, 0.005, 0.001, 0.004]
    position_threshold: 0.005
    stir_radius: 0.009
    stir_speed: 3.0
    center_position_offset: [0.0, 0.0, 0.0]
    end_effector_euler_deg: [0.0, 90.0, -10.0]
  success:
    min_height: 0.85
    max_xy_distance: 0.04
    hold_steps: 240

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}
