name: Level1_close_door

task_type: "openclose"
controller_type: "close"

mode: "collect"
usd_path: "assets/chemistry_lab/lab_001/lab_001.usd"
max_episodes: 100

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

task:
  max_steps: 1000
  camera_warmup_frames: 45
  operate_type: "door"
  bootstrap_open_with_controller: false
  obj_paths:
    - path: "/World/DryingBox_03"
      close_gripper_distance: 0.02
      position_range:
        x: [0.77, 0.85]
        y: [-0.05, 0]
        z: [0.78, 0.78]

cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [-0.7, 1.4, 1.4]
    resolution: [256, 256]
    focal_length: 2
    orientation: [-0.2297, -0.18336, 0.59631, 0.74701]
    image_type: "rgb"

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [-1, -0.1, 3.6]
    resolution: [256, 256]
    focal_length: 4
    orientation: [0.69035, 0.15304, -0.15304, -0.69035]
    image_type: "rgb"
    
  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"

robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip
  save_frames: -1

open:
  events_dt: [0.0025, 0.005, 0.08, 0.004, 0.05, 0.05, 0.01, 0.004]
  position_threshold: 0.01
  stage0_offset_x: 0.08
  stage1_offset_x: 0.015
  retreat_offset_x: 0.06
  retreat_offset_y: 0.04
  door_open_angle_deg: 50.0
  close_gripper_distance: 0.02
  end_effector_euler_deg: [0.0, 110.0, 0.0]

close:
  door_close_angle_deg: 50.0
  end_effector_euler_deg: [350.0, 90.0, 25.0]
  door_target_distance_threshold: 0.15

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}
