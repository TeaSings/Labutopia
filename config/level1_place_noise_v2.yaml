defaults:
  - level1_place
  - _self_

name: Level1_place_noise_v2

collector:
  compression: gzip
  save_frames: -1
  cache_stride: 20

# v2: 保留较强 xy 偏移来压成功率，但显著收窄 z / 高度 / 姿态噪声，减少“砸桌型失败”。
noise:
  enabled: true
  place_position_xy_noise: [-0.04, 0.04]
  place_position_z_noise: [-0.003, 0.003]
  pre_place_z: [-0.01, 0.01]
  place_offset_z: [-0.008, 0.008]
  end_effector_euler_deg: [-8, 8]
  noise_scale: 2.0
  failure_bias_ratio: 0.9
  noise_distribution: edge_bias
