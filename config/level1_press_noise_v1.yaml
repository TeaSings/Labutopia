# V1: 先做最小 failure-biased 噪声。
# 目标是从 clean 的 100% 成功率开始，优先制造「按得不够深」和「对不准按钮」两类失败。

defaults:
  - level1_press
  - _self_

name: Level1_press_noise_v1

noise:
  enabled: true
  noise_scale: 1.3
  failure_bias_ratio: 0.8
  noise_distribution: edge_bias
  initial_offset: [-0.01, 0.05]
  press_distance: [-0.03, -0.005]
  end_effector_euler_deg: [-10.0, 10.0]
  target_position_offset_y: [-0.03, 0.03]
  target_position_offset_z: [-0.03, 0.03]
